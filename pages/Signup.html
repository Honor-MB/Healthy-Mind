<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/singup.css">
</head>
<body>

  <section class="header">
    <section class="brand__rapper">
      <a href="/Frontend/pages/index.html"><img class="brand__logo" src="../assets/6477e17a7e3447c2487589bb4ccfb4c8fd31de50 (2).png" alt="Brand logo image"></a>
      <p class="brand__name">MindBridge</p>
    </section>
    <a href="../pages/index.html">Back Home</a>
  </section>

  <!-- SIGN IN FORM -->

  <form action="" class="login-form">
    <div class="form__heading">
      <h2 class="form__tittle">Let's get started</h2>
      <p class="form__description">Join <span>MindBridge</span> and begin tracking your mood today.</p>
    </div>
    <div class="form__details">
      <label class="label-info" for="userName" > Username:</label>
      <input class="input-info" type="text" id="userName" placeholder="User431" required autocomplete="on">
    </div>

    <div class="form__details">
      <label class="label-info" for="email" > Email Address:</label>
      <input class="input-info" type="email" id="email" placeholder="example@gmail.com" required autocomplete="on">
    </div>

    <div class="form__details">
      <label class="label-info" for="phoneNumber"> Phone Number:</label>
      <input class="input-info" type="tel" id="phoneNumber" placeholder="+234" required autocomplete="on">
    </div>

    <div class="form__details">
      <label class="label-info" for="password" > password:</label>
      <input class="input-info" type="password" id="password" placeholder= "Enter password" required>
    </div>

    <div class="form__details">
      <label class="label-info" for="confirmPassword" > Confirm Password:</label>
      <input class="input-info" type="text" id="confirmPassword" placeholder= "Enter password" required>
    </div>

    <input class="input-info form__btn" type="submit" value="Create Account">

    <div class="form__footer">
      <p>Already have an account? <a class="form__link" href="./Signup.html">Sign-in</a></p>
      <p>Your data is encrypted and never shared without your consent</p>
    </div>
  </form>
</body>
</html>
