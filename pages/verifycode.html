      <a href="/Frontend/pages/index.html"><img class="brand__logo" src="../assets/6477e17a7e3447c2487589bb4ccfb4c8fd31de50 (2).png" alt="Brand logo image"></a>

  <!-- SIGN IN FORM -->

  <form action="" class="login-form">

    <div class="form__heading">
      <h2 class="form__tittle">Verify Code </h2>
      <p class="form__description">We've sent a 6-digit code to +23481720****98</p>
      <p class="form__description">Enter the code below to continue.</p>
    </div>

    <input class="input-info" type="email" id="email" placeholder="Enter the code" required autocomplete="on">

    <input class="input-info form__btn" type="submit" value="Verify Code">

    <p>Didn't get code? <span>Resend in 45s</span></p>
  </form>
